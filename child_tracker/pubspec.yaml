name: child_tracker
description: "Child Safety GPS Tracking System - Flutter Frontend"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  http: ^1.1.0
  shared_preferences: ^2.2.2
  google_maps_flutter: ^2.5.0
  geolocator: ^14.0.2
  intl: ^0.20.2
  flutter_local_notifications: ^20.1.0
  flutter_app_badger:
    path: third_party/flutter_app_badger
  connectivity_plus: ^7.0.0
  image_picker: ^1.0.7
  fl_chart: ^0.68.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_database: ^11.1.4
  firebase_storage: ^12.3.3
  url_launcher: ^6.3.0
  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.1.6
  google_sign_in_web: ^1.1.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  
  assets:
    - assets/
    - assets/images/
    - assets/icons/
